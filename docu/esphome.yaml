substitutions:
  devicename: shelly-htg3
  friendly_name: "Shelly H&T Gen3"
  updateinterval: 10sec
  write_interval: 20sec
#intervals  
  ghost_clear: 24h
  display_check: 1s
  sht3xd: 60s
  batt_voltage: 60s
  wifi_signal: 60s

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio    

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
    advanced:
      enable_ota_rollback: false



external_components:
  - source: github://oxynatOr/esphome-shelly_ht_gen3@adc    
    refresh: 5s
    components: [shelly_ht_display]
  - source: github://oxynatOr/esphome-uc8119
    components: [uc8119]    



# deep_sleep:
#   run_duration: 25s
#   sleep_duration: 60s
#   wakeup_pin:
#     number: GPIO0
#     allow_other_uses: true
#   wakeup_pin_mode: INVERT_WAKEUP


logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: NONE
  output_power: 8.5db

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      - lambda: id(display).show_ota_begin();
    on_progress:
      - lambda: id(display).show_ota_progress(x);
    on_end:
      - lambda: id(display).show_ota_end();
    on_error:
      - lambda: id(display).show_ota_error();

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
     - ptbtime1.ptb.de
     - ntp.rwth-aachen.de
     - ntp1.informatik.uni-erlangen.de


captive_portal:

i2c:
  sda: GPIO1
  scl: GPIO3
  scan: true
  frequency: 100kHz


uc8119:
  id: epd
  address: 0x50
  reset_pin: GPIO7
  busy_pin: GPIO6
  enable_pin: GPIO10
  ghost_clear_interval: ${ghost_clear}

shelly_ht_display:
  id: display
  usb_powered: false
  display_id: epd
  check_interval: ${display_check}
  temperature_sensor: temp_sensor
  humidity_sensor: humi_sensor
  battery_sensor: batt_voltage
  wifi_signal_sensor: wifi_rssi
  time_id: sntp_time
  font: siekoo     # Default — verwechslungsfrei (O≠0, I≠1, S≠5)
  # font: classic  # Traditionelle 7-Segment-Darstellung


# --- SHT31 Sensor ---
sensor:
  - platform: sht3xd
    address: 0x44
    heater_enabled: false
    update_interval: ${sht3xd}
    temperature:
      name: "Temperature"
      id: temp_sensor
      accuracy_decimals: 1
    humidity:
      name: "Humidity"
      id: humi_sensor
      accuracy_decimals: 0

  - platform: adc
    pin: GPIO2
    name: "Battery voltage"
    id: batt_voltage
    attenuation: 12db
    update_interval: ${batt_voltage}
    filters:
      - multiply: 2.0    

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: ${wifi_signal}


binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button"
    id: button_main
    on_multi_click:
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - logger.log: "Button: short → Force Refresh"
          - lambda: id(display).force_refresh();
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - logger.log: "Button: double → Ghost Clear"
          - lambda: |-
              id(epd).request_ghost_clear();
              id(display).force_refresh();
      - timing:
          - ON for at least 3s
        then:
          - logger.log: "Button: long → Reboot"
          - lambda: |-
              id(epd).clear();
              id(display).show_text_clock("E5P");              
              id(display).show_text_big("rSt");
              id(epd).commit();
          - delay: 1s
          - button.press: restart_btn


button:
  - platform: template
    name: "Display: Refresh"
    icon: "mdi:refresh"
    on_press:
      - lambda: id(display).force_refresh();

  - platform: template
    name: "Display: Ghost Clear"
    icon: "mdi:monitor-shimmer"
    on_press:
      - lambda: |-
          id(epd).request_ghost_clear();
          id(display).force_refresh();

  - platform: template
    name: "Display: Text Test"
    icon: "mdi:format-text"
    on_press:
      - lambda: |-
          id(epd).clear();
          id(display).show_text_big("ESP");
          id(display).show_text_clock("COOL");
          id(display).show_colon(true);
          id(display).show_bluetooth(true);
          id(display).show_signal(2);
          id(display).show_globe(true);
          id(epd).commit();

  - platform: restart
    name: "Restart"
    id: restart_btn
